<!DOCTYPE html>
<html>
<head><title>RupeeGuard AI</title></head>
<body style="font-family: Arial; max-width: 600px; margin: 40px auto;">
  <h2>RupeeGuard AI — Counterfeit Detection</h2>
  <input type="file" id="fileInput" accept="image/*"><br><br>
  <button onclick="submitImage()">Check Note</button>
  <div id="result" style="margin-top:20px; white-space: pre-wrap;"></div>

  <script>
    async function submitImage() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { alert("Choose an image first"); return; }
      const formData = new FormData();
      formData.append("file", file);
      document.getElementById('result').innerText = "Analyzing...";
      const res = await fetch("/predict", { method: "POST", body: formData });
      const data = await res.json();
      document.getElementById('result').innerText =
        `Verdict: ${data.verdict.toUpperCase()}\nConfidence: ${data.confidence}%\n\nForensic Report:\n${data.forensic_report}`;
    }
  </script>
</body>
</html>
